# Nixpacks configuration for multi-language (Python + Node.js) deployment
providers = ['python', 'node']

[phases.setup]
nixPkgs = ['python311', 'gcc', 'bash']

[phases.install]
cmds = [
  'curl -sS https://bootstrap.pypa.io/get-pip.py | python3',
  'python3 -m pip install --no-cache-dir -r ai_service/requirements.txt',
  'npm install --prefix backend',
  'npm install --prefix frontend'
]

[phases.build]
cmds = [
  'npm run build --prefix frontend',
  'npm run build --prefix backend'
]

[start]
cmd = 'sed -i "s/\r$//" start.sh && chmod +x start.sh && ./start.sh'
