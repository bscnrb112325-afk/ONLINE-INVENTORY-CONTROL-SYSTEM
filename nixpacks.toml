# Nixpacks / Railpack configuration for multi-language (Python + Node.js) deployment
[providers]
providers = ['python', 'node']

[phases.setup]
nixPkgs = ['python311', 'nodejs_20', 'gcc', 'bash']

[phases.install]
cmds = [
  'pip install --no-cache-dir -r ai_service/requirements.txt',
  'npm install --prefix backend',
  'npm install --prefix frontend'
]

[phases.build]
cmds = [
  'npm run build --prefix frontend',
  'npm run build --prefix backend'
]

[start]
cmd = 'sed -i "s/\r$//" start.sh && chmod +x start.sh && ./start.sh'
